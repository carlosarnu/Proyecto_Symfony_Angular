<main class="mx-auto max-w-7xl px-4 py-10">
  <h1 class="mb-6 text-2xl font-bold text-slate-900">Panel de administración</h1>

  <!-- Crear usuario -->
  <section class="rounded-xl bg-gradient-to-tr from-white to-primary-50 p-6 shadow-lg mb-6">
    <form
      [formGroup]="form"
      (ngSubmit)="create()"
      class="grid grid-cols-1 gap-4 md:grid-cols-12 md:items-end"
    >
      <div class="md:col-span-4">
        <label class="block text-sm font-semibold mb-1 text-primary">Email</label>
        <input
          placeholder="email@empresa.com"
          formControlName="email"
          class="mt-1 h-10 w-full rounded-lg border border-gray-300 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary shadow-sm"
        />
        <p *ngIf="form.controls['email'].touched && form.controls['email'].invalid" class="text-red-500 text-xs mt-1">
          Email obligatorio y válido
        </p>
      </div>

      <div class="md:col-span-3">
        <label class="block text-sm font-semibold mb-1 text-primary">Contraseña</label>
        <input
          placeholder="••••••••"
          type="password"
          formControlName="password"
          class="mt-1 h-10 w-full rounded-lg border border-gray-300 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary shadow-sm"
        />
        <p *ngIf="form.controls['password'].touched && form.controls['password'].invalid" class="text-red-500 text-xs mt-1">
          Contraseña obligatoria (mín. 6 caracteres)
        </p>
      </div>

      <div class="md:col-span-3">
        <label class="block text-sm font-semibold mb-1 text-primary">Nombre</label>
        <input
          placeholder="Nombre"
          formControlName="nombre"
          class="mt-1 h-10 w-full rounded-lg border border-gray-300 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary shadow-sm"
        />
      </div>

      <div class="md:col-span-2">
        <label class="block text-sm font-semibold mb-1 text-primary">Roles</label>
        <select
          formControlName="roles"
          multiple
          class="mt-1 h-10 w-full rounded-lg border border-gray-300 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary shadow-sm bg-gradient-to-r from-green-100 to-green-50"
        >
          <option value="ROLE_USER">ROLE_USER</option>
          <option value="ROLE_ADMIN">ROLE_ADMIN</option>
        </select>
      </div>

      <div class="md:col-span-12 flex justify-end">
        <button
          type="submit"
          [disabled]="form.invalid"
          class="inline-flex h-10 items-center rounded-lg bg-gradient-to-r from-primary to-primary-600 px-5 text-white font-bold hover:from-primary-600 hover:to-primary-700 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          Crear usuario 🎉
        </button>
      </div>
    </form>
  </section>

  <!-- Search -->
  <div class="mb-4">
    <input
      placeholder="Buscar usuarios..."
      [(ngModel)]="q"
      (ngModelChange)="load()"
      class="h-10 w-full sm:w-80 rounded-lg border border-gray-300 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary shadow-sm"
    />
  </div>

  <!-- Tabla de usuarios -->
  <div class="overflow-hidden rounded-xl shadow-lg border border-slate-200 bg-white">
    <table class="min-w-full divide-y divide-slate-200">
      <thead class="bg-slate-50">
        <tr>
          <th class="px-4 py-2 text-left text-sm font-semibold text-slate-700">ID</th>
          <th class="px-4 py-2 text-left text-sm font-semibold text-slate-700">Email</th>
          <th class="px-4 py-2 text-left text-sm font-semibold text-slate-700">Roles</th>
          <th class="px-4 py-2 text-right text-sm font-semibold text-slate-700">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-200 bg-white">
        <tr *ngFor="let u of users" class="hover:bg-primary-50 transition">
          <td class="px-4 py-2 text-sm text-slate-700">{{ u.id }}</td>
          <td class="px-4 py-2 text-sm text-slate-700">{{ u.email }}</td>
          <td class="px-4 py-2 text-sm text-slate-700">{{ u.roles.join(', ') }}</td>
          <td class="px-4 py-2 text-right text-sm flex justify-end gap-2">
            <button
              type="button"
              (click)="resetPassword(u.id)"
              class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm text-slate-700 bg-gradient-to-r from-yellow-100 to-yellow-50 hover:from-yellow-200 hover:to-yellow-100 shadow-sm transition"
              aria-label="Reset password"
            >
              Reset 🔑
            </button>
          </td>
        </tr>
        <tr *ngIf="!users.length">
          <td colspan="4" class="text-center py-6 text-slate-500 italic">
            ¡No hay usuarios todavía! 🌟
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>
