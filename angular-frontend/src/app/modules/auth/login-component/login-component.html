<form [formGroup]="form" (ngSubmit)="onSubmit()" class="mx-auto mt-12 max-w-md space-y-6 bg-surface-light dark:bg-surface-dark p-8 rounded-xl shadow-lg transition-colors duration-300">
  <h1 class="text-3xl font-bold text-primary dark:text-primary-dark text-center mb-4">🎯 Just Check It!</h1>

  <!-- Email -->
  <div>
    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1">Email</label>
    <input
      type="email"
      formControlName="email"
      placeholder="tu@email.com"
      class="w-full rounded-lg border border-gray-300 dark:border-gray-600 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary shadow-sm transition-colors duration-300 dark:bg-background-dark dark:text-slate-100"
    />
  </div>

  <!-- Contraseña -->
  <div>
    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1">Contraseña</label>
    <input
      type="password"
      formControlName="password"
      placeholder="••••••••"
      class="w-full rounded-lg border border-gray-300 dark:border-gray-600 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary shadow-sm transition-colors duration-300 dark:bg-background-dark dark:text-slate-100"
    />
  </div>

  <!-- Botón Entrar -->
  <button
    [disabled]="loading || form.invalid"
    class="w-full h-12 rounded-lg bg-gradient-to-r from-primary to-primary-600 text-white font-bold shadow-lg hover:from-primary-600 hover:to-primary-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
  >
    🚀 Entrar
  </button>

  <!-- Botón Registrarse -->
  <a
    routerLink="/register"
    class="w-full inline-block text-center rounded-lg bg-gradient-to-r from-secondary to-secondary-600 text-white font-bold py-3 shadow-lg hover:from-secondary-600 hover:to-secondary-700 transition-all"
  >
    📝 Registrarse
  </a>
</form>
