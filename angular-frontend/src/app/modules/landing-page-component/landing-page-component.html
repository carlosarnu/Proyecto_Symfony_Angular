<main [class.dark]="isDarkMode"
      class="min-h-screen transition-colors duration-300 
             bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">

  <!-- Contenedor centrado -->
  <div class="mx-auto max-w-7xl px-4 sm:px-8 lg:px-16 py-24 sm:py-32">

    <div class="mx-auto max-w-2xl text-center sm:text-left">

      <!-- Título -->
      <app-page-title
        title="🎯 Just Check It!"
        subtitle="Organiza tus tareas para no perderte nada."
      ></app-page-title>

      <!-- Toggle oscuro -->
      <div class="mt-4 flex justify-center sm:justify-start">
        <button (click)="toggleDarkMode()"
                class="px-4 py-2 rounded-md border border-slate-300 dark:border-slate-700
                       bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200
                       hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
          {{ isDarkMode ? '🌙 Modo Oscuro' : '☀️ Modo Claro' }}
        </button>
      </div>

      <!-- Enlaces login/registro -->
      <div class="mt-6 flex items-center justify-center gap-4 sm:justify-start">
        <a routerLink="/login"
           class="px-5 py-2 rounded-md bg-blue-600 text-white font-semibold shadow 
                  hover:bg-blue-500 dark:bg-blue-800 dark:hover:bg-blue-700 transition-colors duration-200 text-center">
          Entrar
        </a>
        <a routerLink="/register"
           class="px-5 py-2 rounded-md bg-green-500 text-white font-semibold shadow 
                  hover:bg-green-400 dark:bg-green-700 dark:hover:bg-green-600 transition-colors duration-200 text-center">
          Registrarme
        </a>
      </div>

      <!-- Botón Comenzar -->
      <div class="mt-10 flex flex-col sm:flex-row sm:justify-start gap-4 sm:gap-6">
        <a routerLink="/tasks"
           class="w-full sm:w-auto rounded-md bg-gradient-to-r from-primary to-primary-600 px-6 py-3 text-white font-semibold shadow 
                  hover:from-primary-600 hover:to-primary-700 dark:from-primary-dark dark:to-primary-700 transition-all text-center">
          Comenzar
        </a>
      </div>

    </div>

  </div>
</main>
