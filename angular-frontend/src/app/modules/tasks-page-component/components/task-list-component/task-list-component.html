<section class="mt-10">

  <!-- Loading -->
  <p *ngIf="loading$ | async" class="text-slate-500 animate-pulse">
    Cargando tareas… ⏳
  </p>

  <!-- Error -->
  <p *ngIf="(error$ | async) as err" class="text-red-600 font-semibold">
    {{ err }} ❌
  </p>

  <!-- Contenido -->
  <ng-container *ngIf="(tasks$ | async) as tasks">
    
    <!-- Sin tareas -->
    <p *ngIf="!tasks.length" class="text-slate-500 italic text-center py-6">
      ¡No hay tareas por aquí! Añade una ya 🎉
    </p>

    <!-- Lista de tareas -->
    <div *ngIf="tasks.length" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 lg:gap-6">
      <article
        *ngFor="let t of tasks"
        class="rounded-xl border border-slate-200 bg-gradient-to-tr from-white to-primary-50 p-6 shadow-lg hover:shadow-xl transition-all hover:scale-105"
      >
        <h3 class="text-lg font-bold text-slate-900 mb-2">{{ t.titulo }}</h3>
        
        <p class="text-sm mb-1">
          Estado:
          <span
            class="font-semibold capitalize px-2 py-1 rounded-full text-white"
            [ngClass]="{
              'bg-amber-500': t.estado === 'pendiente',
              'bg-blue-500': t.estado === 'en progreso',
              'bg-emerald-500': t.estado === 'completada'
            }"
          >
            {{ t.estado }}
          </span>
        </p>

        <p class="text-sm text-slate-600">
          Fecha límite: <span class="font-medium">{{ t.fechaLimite || 'Sin fecha definida' }}</span>
        </p>

      </article>
    </div>

  </ng-container>

</section>
